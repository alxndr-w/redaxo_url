package: url2
version: '2.0.0.1-dev'
author: Thomas Blum
supportpage: https://github.com/alxndr-w/redaxo_url/

page:
    title: 'translate:url'
    perm: admin[]
    pjax: false
    icon: rex-icon fa fa-anchor
    subpages:
        generator:
            title: 'translate:generator'
            subpages:
                profiles:
                    title: 'translate:url_generator_profiles'
                urls:
                    title: 'translate:url_generator_urls_generated'
        help:
            title: translate:url_generator_help
            pjax: false
            subPath: README.md
            itemclass: pull-right

conflicts:
    packages:
        url: '*'
        
requires:
    redaxo: ^5.11.0
    packages:
        yrewrite: ^2.5.0
    php:
        extensions: [intl]
        version: ^7.3
